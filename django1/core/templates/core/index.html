{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <h1>Index</h1>

    <img src="{% static 'images/django.png' %}">
    <h2>{{ curso }}</h2>
    <p>{{ outro }}</p>
    <!--    Criando uma tabela-->
    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Preço</th>
<!--                <th>Estoque</th>-->
            </tr>
        </thead>
        <tbody>
            {% for product in products %}
                <tr>
                    <td><a href="{% url 'product' product.id%}">{{ product.name }}</a hrf></td>
                    <td>{{ product.price }}</td>
<!--                    <td>{{ product.stock_quantity }}</td>-->
                </tr>
            {% endfor %}
        </tbody>
    </table>
    <button onclick="teste();"> Clique-me </button>
    <script type="text/javascript" src="{% static 'js/script.js' %}"></script>
</body>
</html>
